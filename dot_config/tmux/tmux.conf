# Options
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set-option -g escape-time 10

set-option -g focus-events on
set -g status-position bottom
set -g status-justify centre
set -gq allow-passthrough on

# Use tmux's own terminfo inside panes and advertise truecolor to the outer
# terminal. Windows Terminal through WSL commonly reports xterm-256color.
set -g default-terminal "tmux-256color"
set -g terminal-features 'xterm*:clipboard:ccolour:cstyle:extkeys:focus:title,screen*:title,rxvt*:ignorefkeys,*:RGB'
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colors - needs tmux-3.0
## Mute bells on windows especially
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
set -g monitor-activity off
set -g bell-action none
set -g extended-keys always
set -g extended-keys-format csi-u

set-window-option -g mode-keys vi
bind -n S-Enter send-keys -l "\033[13;2u"

# Bindings
unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind -n M-H previous-window
bind -n M-L next-window

# Use Alt-arrow keys without prefix key to switch panes
bind -n C-Left select-pane -L
bind -n C-Right select-pane -R
bind -n C-Up select-pane -U
bind -n C-Down select-pane -D

# Shift arrow to switch windows
bind -n C-S-Left  previous-window
bind -n C-S-Right next-window

bind-key x kill-pane # skip confirmation
set -g detach-on-destroy on # don't exit when closing a session

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind g display-popup -d '#{pane_current_path}' -h "80%" -w "80%" -E "lazygit"
bind o display-popup -d '#{pane_current_path}' -h "80%" -w "80%" -E "opencode"

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

bind r command-prompt -I "#W" "rename-window '%%'"

# List of plugins
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'keyzou/tmux-ukiyo'

set -g @ukiyo-theme "kanagawa/wave"
set -g @ukiyo-ignore-window-colors true
set -g @ukiyo-nvim-statusline true

# Initialize tpack.
run 'tpack init'

# Sesh session switcher via television. Defined after `tpack init` so it
# overrides the ukiyo theme's default `T` menu binding.
bind-key "T" display-popup -E -w 80% -h 70% -d '#{pane_current_path}' -T 'Sesh' tv sesh
